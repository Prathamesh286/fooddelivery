spring.application.name=food-delivery

# ─── MySQL Database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/FoodDashdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=add your password here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver    

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=FoodDash-super-secret-key-2024-production-grade-very-long-string
jwt.expiration=86400000

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.com.fooddelivery=INFO

# ─── Google OAuth ─────────────────────────────────────────────────────────────
# Replace with your actual Google OAuth Client ID from https://console.cloud.google.com/
google.client-id=add your google client id here

# ─── Razorpay ────────────────────────────────────────────────────────────────
# Get these from https://dashboard.razorpay.com/app/keys (use Test keys first)
razorpay.key-id=add your key id here
razorpay.key-secret=add your key secret here
